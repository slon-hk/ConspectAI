<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>503 · Сервис временно недоступен</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;450;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0b09;--surface:#171512;--border:#272420;
    --accent:#c8913a;--accent-hi:#dda74d;--accent-glow:rgba(200,145,58,.32);
    --text-1:#e6e1d5;--text-2:#a39e91;--text-3:#6e6a60;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}

  body{
    font-family:'DM Sans',sans-serif;color:var(--text-1);
    background-color:var(--bg);
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    position:relative;
    transition:background-image .6s ease-in;
  }

  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse at center, rgba(12,11,9,.55) 0%, rgba(12,11,9,.85) 80%),
      linear-gradient(180deg, rgba(12,11,9,.6) 0%, rgba(12,11,9,.4) 50%, rgba(12,11,9,.85) 100%);
    pointer-events:none;z-index:1;
  }

  .wrap{
    position:relative;z-index:2;
    height:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:32px;text-align:center;
  }

  .logo{
    position:absolute;top:28px;left:32px;
    display:flex;align-items:center;gap:10px;
    text-decoration:none;transition:opacity .15s;
  }
  .logo:hover{opacity:.8}
  .logo-icon{
    width:34px;height:34px;border-radius:10px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 20px var(--accent-glow);
    animation:pulse 2.6s ease-in-out infinite;
  }
  .logo-text{
    font-family:'Cormorant Garamond',serif;font-weight:300;letter-spacing:.04em;
    font-size:22px;color:var(--text-1);
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}
    50%   {box-shadow:0 0 0 10px transparent}
  }

  .code{
    font-family:'Cormorant Garamond',serif;font-weight:300;
    font-size:clamp(120px, 22vw, 240px);line-height:.9;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-hi) 50%, var(--accent) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    margin-bottom:8px;letter-spacing:-.02em;
    filter:drop-shadow(0 4px 24px rgba(200,145,58,.18));
  }

  .title{
    font-family:'Cormorant Garamond',serif;font-weight:400;font-style:italic;
    font-size:clamp(24px, 3vw, 36px);color:var(--text-1);
    margin-bottom:14px;letter-spacing:.01em;
  }

  .desc{
    font-size:15px;line-height:1.65;color:var(--text-2);
    max-width:480px;margin-bottom:24px;
  }

  /* Contact card */
  .contact{
    display:inline-flex;align-items:center;gap:10px;
    padding:12px 18px;border-radius:12px;
    background:rgba(23,21,18,.65);
    border:1px solid var(--border);
    backdrop-filter:blur(8px);
    margin-bottom:28px;
    font-size:13.5px;
  }
  .contact-label{color:var(--text-3)}
  .contact a{color:var(--accent);text-decoration:none;font-family:'DM Mono',monospace}
  .contact a:hover{color:var(--accent-hi);text-decoration:underline}
  .contact-dot{
    width:7px;height:7px;border-radius:50%;background:#f87171;
    box-shadow:0 0 10px rgba(248,113,113,.6);
    animation:blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}

  .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:11px 22px;border-radius:10px;
    font-size:14px;font-weight:500;font-family:inherit;
    cursor:pointer;text-decoration:none;border:1px solid transparent;
    transition:all .2s;background:none;color:inherit;
  }
  .btn-primary{background:var(--accent);color:#0c0b09;border-color:var(--accent)}
  .btn-primary:hover{background:var(--accent-hi);box-shadow:0 0 24px var(--accent-glow);transform:translateY(-1px)}
  .btn-secondary{background:rgba(23,21,18,.6);color:var(--text-1);border-color:var(--border);backdrop-filter:blur(6px)}
  .btn-secondary:hover{background:var(--surface);border-color:var(--accent)}
  .btn .ico{transition:transform .8s}
  .btn-primary:hover .ico{transform:rotate(360deg)}

  .hint{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    font-family:'DM Mono',monospace;font-size:11px;
    color:var(--text-3);letter-spacing:.05em;
    display:flex;align-items:center;gap:8px;
  }
  .hint .dot{width:5px;height:5px;border-radius:50%;background:var(--text-3)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .anim{animation:fadeUp .8s cubic-bezier(.2,.8,.2,1) both}
  .anim-1{animation-delay:.05s}
  .anim-2{animation-delay:.18s}
  .anim-3{animation-delay:.30s}
  .anim-4{animation-delay:.42s}
  .anim-5{animation-delay:.54s}

  @media(max-width:600px){
    .logo{top:18px;left:18px}
    .actions{flex-direction:column;width:100%;max-width:280px}
    .btn{justify-content:center}
  }
</style>
</head>
<body>

<a href="/" class="logo">
  <div class="logo-icon">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="#0c0b09"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <span class="logo-text">ConspectAI</span>
</a>

<div class="wrap">
  <div class="code anim anim-1">503</div>
  <h1 class="title anim anim-2">Сервис временно недоступен</h1>
  <p class="desc anim anim-3">
    Что-то пошло не так с нашей стороны. Мы уже работаем над восстановлением — попробуйте обновить страницу через несколько минут.
  </p>

  <div class="contact anim anim-4">
    <span class="contact-dot"></span>
    <span class="contact-label">Срочно?&nbsp;</span>
    <a href="mailto:support@conspectai.tech">support@conspectai.tech</a>
  </div>

  <div class="actions anim anim-5">
    <button class="btn btn-primary" onclick="location.reload()">
      <svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Обновить страницу
    </button>
    <a href="/" class="btn btn-secondary">На главную</a>
  </div>
</div>

<p class="hint">
  <span class="dot"></span>
  <span>Service Unavailable · Status 503</span>
</p>

<script>
  // Random background. If manifest is unreachable (e.g. deep outage), fallback
  // gradient is already applied to body.
  fetch('/static/error-bg/manifest.json', { cache: 'no-cache' })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || !Array.isArray(data.images) || !data.images.length) return;
      const file = data.images[Math.floor(Math.random() * data.images.length)];
      const img = new Image();
      img.onload = () => {
        document.body.style.backgroundImage = `url(/static/error-bg/${file})`;
      };
      img.src = `/static/error-bg/${file}`;
    })
    .catch(() => {});

  // Auto-retry every 30 seconds — silently check if the service is back.
  // If it answers, reload the page so the user gets back to work.
  setInterval(() => {
    fetch('/api/models', { cache: 'no-cache' })
      .then(r => { if (r.ok) location.reload(); })
      .catch(() => {});
  }, 30000);
</script>

</body>
</html>
