      {id:1,name:'Старт',    tokens:100_000,  price:'₽199', badge:null},
      {id:2,name:'Стандарт', tokens:500_000,  price:'₽799', badge:'Популярный'},
      {id:3,name:'Профи',    tokens:2_000_000,price:'₽2 499',badge:'Выгодно'},
    ],

    get currentChat() {
      return Array.isArray(this.chats)
        ? (this.chats.find(c=>c.id===this.currentChatId) || null)
        : null;
    },

    // ── Lifecycle ──────────────────────────────────────────────────────────
    async init() {
      const [models, templates] = await Promise.all([
        fetch('/api/models').then(r=>r.json()).catch(()=>({})),
        fetch('/api/templates').then(r=>r.json()).catch(()=>({})),
      ]);
      this.modelCatalog = models;
      this.templateMeta = templates;
      if (this.token) await this.loadUser();
    },

    // ── Auth ───────────────────────────────────────────────────────────────
    async login() {
      this.authErr = ''; this.authLoading = true;
      try {
        const r = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email: this.loginEmail, password: this.loginPass}),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Ошибка входа');
        this.token = d.access_token;
        localStorage.setItem('orion_token', this.token);
        this.user = d.user;
        await this.loadChats();
      } catch(e) { this.authErr = e.message; }
      finally { this.authLoading = false; }
    },

    async register() {
      if (!this.regAgree) {
        this.authErr = 'Для регистрации примите условия оферты и политики конфиденциальности';
        return;
      }

      this.authErr = ''; 
      this.authLoading = true;

      try {
        const r = await fetch('/api/auth/register', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            username:  this.regName,
            email:     this.regEmail,
            password:  this.regPass,
            agreement: this.regAgree,
          }),
        });

        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Ошибка регистрации');

        this.token = d.access_token;
        localStorage.setItem('orion_token', this.token);
        this.user = d.user;
        await this.loadChats();

      } catch(e) {
        this.authErr = e.message;
      } finally {
        this.authLoading = false;
      }
    },

    logout() {
      this.token = ''; localStorage.removeItem('orion_token');
      this.chats = []; this.messages = []; this.currentChatId = null;
    },

    // ── API helpers ────────────────────────────────────────────────────────
    api(path, opts={}) {
      return fetch(path, {
        ...opts,
        headers: { 'Authorization': `Bearer ${this.token}`, ...(opts.headers||{}) },
      });
    },

    // Fire-and-forget client-side analytics. Server validates against an allowlist.
    track(event, props={}) {
      try {
        fetch('/api/track', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(this.token ? { 'Authorization': `Bearer ${this.token}` } : {}),
          },
          body: JSON.stringify({ event, props }),
        }).catch(()=>{});
      } catch {}
    },

    async loadUser() {
      try {
        const r = await this.api('/api/user');
        if (r.status === 401) {
          // Stale/invalid token — force fresh login. Don't try to load anything else.
          this.logout();
          return;
        }
        if (!r.ok) return;
        this.user = await r.json();
        await this.loadChats();
      } catch(e) { console.error('loadUser:', e); }
    },

    async loadChats() {
      try {
        const r = await this.api('/api/chats');
        if (r.status === 401) { this.logout(); return; }
        if (!r.ok) { this.chats = []; return; }
        const data = await r.json();
        this.chats = Array.isArray(data) ? data : [];
      } catch(e) {
        console.error('loadChats:', e);
        this.chats = [];
      }
    },

    // ── Chat ops ───────────────────────────────────────────────────────────
    async selectChat(id) {
      this.currentChatId = id; this.messages = []; this.pendingFiles = [];
      this.mmMd = ''; this.mmUpdatedAt = null;
      try {
        const r = await this.api(`/api/chats/${id}/messages`);
        if (r.status === 401) { this.logout(); return; }
        if (!r.ok) { this.messages = []; return; }
        const data = await r.json();
        this.messages = Array.isArray(data) ? data : [];
        this.$nextTick(()=>this.scrollDown());
        if (this.showMindmap) await this.loadMindmap();
      } catch(e) { console.error('selectChat:', e); }
    },

    async createChat() {
      try {
        const fd = new FormData(); fd.append('template','deep'); fd.append('model','gemini-2.0-flash');
        const r = await this.api('/api/chats', { method:'POST', body:fd });
        if (r.status === 401) { this.logout(); return; }
        if (!r.ok) {
          console.error('createChat failed:', r.status);
          return;
        }
        const chat = await r.json();
        if (!chat || !chat.id) {
          console.error('createChat: server returned no chat id', chat);
          return;
        }
        this.chats.unshift(chat);
        await this.selectChat(chat.id);
      } catch(e) { console.error('createChat:', e); }
    },

    async deleteChat(id) {
      try {
        const r = await this.api(`/api/chats/${id}`, { method:'DELETE' });
        if (r.status === 401) { this.logout(); return; }
        this.chats = this.chats.filter(c => c.id !== id);
        if (this.currentChatId === id) { this.currentChatId = null; this.messages = []; }
      } catch(e) { console.error('deleteChat:', e); }
    },

    async switchTemplate(key) {
      const c = this.chats.find(c=>c.id===this.currentChatId); if(c) c.template=key;
      try { const fd=new FormData(); fd.append('template',key); await this.api(`/api/chats/${this.currentChatId}/settings`,{method:'PATCH',body:fd}); } catch {}
    },
    async switchModel(key) {
      const c = this.chats.find(c=>c.id===this.currentChatId); if(c) c.model=key;
      try { const fd=new FormData(); fd.append('model',key); await this.api(`/api/chats/${this.currentChatId}/settings`,{method:'PATCH',body:fd}); } catch {}
    },

    // ── Drag & Drop ────────────────────────────────────────────────────────
    handleDragLeave(e) { if (!e.relatedTarget||e.relatedTarget===document.body) this.globalDrag=false; },
    async handleDrop(e) {
      this.globalDrag=false;
      if (!this.currentChatId) return;
      await this.processFiles(Array.from(e.dataTransfer.files));
    },
    async onFileSelect(e) { await this.processFiles(Array.from(e.target.files)); e.target.value=''; },
    async processFiles(files) {
      for (const f of files) {
        const fd = new FormData(); fd.append('file',f);
        try {
          const info = await this.api('/api/upload',{method:'POST',body:fd}).then(r=>r.json());
          this.pendingFiles.push(info);
        } catch(e) { console.error('Upload error:',e); }
      }
    },

    // ── Send ───────────────────────────────────────────────────────────────
    async send() {
      const text = this.inputText.trim(); const files = [...this.pendingFiles];
      if (!text && !files.length) return;
      if (this.loading) return;

      this.messages.push({id:'tmp-'+Date.now(),role:'user',content:text,files,created_at:new Date().toISOString()});
      this.inputText=''; this.pendingFiles=[]; this.loading=true;
      this.$nextTick(()=>this.scrollDown());

      try {
        const fd = new FormData();
        fd.append('content', text);
        fd.append('files_json', JSON.stringify(files.map(f=>({sha256:f.sha256,original_filename:f.original_filename,mime_type:f.mime_type,compressed:f.compressed}))));
        const r = await this.api(`/api/chats/${this.currentChatId}/messages`,{method:'POST',body:fd});
        if (!r.ok) {
          const e = await r.json().catch(()=>({detail:r.statusText}));
          throw new Error(e.detail||'Ошибка сервера');
        }
        const reply = await r.json();
        this.messages.push(reply);
        const c = this.chats.find(c=>c.id===this.currentChatId);
        if (c&&(c.title==='Новый чат')&&text) c.title=text.slice(0,55)+(text.length>55?'…':'');
        const u = await this.api('/api/user').then(r=>r.json());
        this.user = u;
        // Refresh mindmap (server is generating it in background)
        this.scheduleMindmapRefresh();
      } catch(ex) {
        this.messages.push({id:'err-'+Date.now(),role:'assistant',content:`⚠️ ${ex.message}`,files:[],tokens_used:0,cost_usd:0,created_at:new Date().toISOString()});
      } finally { this.loading=false; this.$nextTick(()=>this.scrollDown()); }
    },

    // ── Export ─────────────────────────────────────────────────────────────
    buildMd() {
      const chat = this.currentChat; let md = `# ${chat?.title||'ConspectAI Chat'}\n\n`;
      md += `> Шаблон: ${this.templateMeta[chat?.template]?.name||''} · Модель: ${this.modelCatalog[chat?.model]?.name||''}\n\n---\n\n`;
      for (const m of this.messages) {
        if (m.role==='user'&&!this.pdfS.includeQ) continue;
        if (this.pdfS.timestamps) { const d=new Date((m.created_at||'')+'Z'); md+=`*${d.toLocaleString('ru-RU')}*\n\n`; }
        md += m.role==='user' ? `**Вопрос:** ${m.content}\n\n---\n\n` : `${m.content}\n\n---\n\n`;
      }
      return md;
    },
    exportMD() {
      this.track('export_md', { chat_id: this.currentChatId, msgs: this.messages.length });
      const md=this.buildMd(), blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download=(this.currentChat?.title||'chat').replace(/[^\w\-]/g,'_').slice(0,50)+'.md';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    },
    exportPDF() {
      this.track('export_pdf', { chat_id: this.currentChatId, msgs: this.messages.length });
      const s=this.pdfS; const html=marked.parse(this.buildMd());
      const win=window.open('','_blank');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${this.currentChat?.title||'ConspectAI'}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>

    // ── Mindmap ────────────────────────────────────────────────────────────
    get mmStatusText() {
      if (this.mmLoading) return 'Обновление карты…';
      if (this.mmUpdatedAt) {
        const d = new Date(this.mmUpdatedAt.endsWith('Z')?this.mmUpdatedAt:this.mmUpdatedAt+'Z');
        return `Обновлено ${this.relTime(this.mmUpdatedAt)}`;
      }
      return 'Карта обновится после первого ответа';
    },

    async toggleMindmap() {
      this.showMindmap = !this.showMindmap;
      if (this.showMindmap) {
        await this.loadMindmap();
      }
    },

    async loadMindmap() {
      if (!this.currentChatId) return;
      try {
        const resp = await this.api(`/api/chats/${this.currentChatId}/mindmap`);
        if (!resp.ok) return;
        const r = await resp.json();
        this.mmMd = r.markdown || '';
        this.mmUpdatedAt = r.updated_at;
        if (this.mmMd) this.$nextTick(() => this.renderMindmap());
      } catch(e) { console.error('mindmap load:',e); }
    },

    renderMindmap() {
      const svg = document.getElementById('mm-svg');
      if (!svg || !this.mmMd) return;
      // Wait for esm.sh module to finish loading
      if (!window.MarkmapAPI) {
        window.addEventListener('markmap-ready', () => this.renderMindmap(), { once: true });
        return;
      }
      try {
        if (this.mmInstance && typeof this.mmInstance.destroy === 'function') {
          this.mmInstance.destroy();
        }
        svg.innerHTML = '';
        const { Transformer, Markmap } = window.MarkmapAPI;
        const transformer = new Transformer();
        const { root } = transformer.transform(this.mmMd);
        this.mmInstance = Markmap.create(svg, {
          duration: 350,
          spacingHorizontal: 70,
          spacingVertical: 6,
          paddingX: 10,
          color: () => '#c8913a',
        }, root);
      } catch (e) { console.error('mindmap render:', e); }
    },

    async regenerateMindmap() {
      if (!this.currentChatId || this.mmLoading) return;
      this.mmLoading = true;
      try {
        await this.api(`/api/chats/${this.currentChatId}/mindmap/regenerate`, {method:'POST'});
        // Server runs it in the background — poll for changes
        const beforeUpdate = this.mmUpdatedAt;
        for (let i = 0; i < 10; i++) {
          await new Promise(r => setTimeout(r, 1500));
          await this.loadMindmap();
          if (this.mmUpdatedAt && this.mmUpdatedAt !== beforeUpdate) break;
        }
      } catch(e) { console.error(e); }
      finally { this.mmLoading = false; }
    },

    scheduleMindmapRefresh() {
      // Called after sending a message — server is generating in the background.
      if (this.mmRefreshTimer) clearTimeout(this.mmRefreshTimer);
      const beforeUpdate = this.mmUpdatedAt;
      this.mmLoading = true;
      let attempts = 0;
      const poll = async () => {
        attempts++;
        await this.loadMindmap();
        if (this.mmUpdatedAt && this.mmUpdatedAt !== beforeUpdate) {
          this.mmLoading = false;
          return;
        }
        if (attempts < 8) {
          this.mmRefreshTimer = setTimeout(poll, 1800);
        } else {
          this.mmLoading = false;
        }
      };
      this.mmRefreshTimer = setTimeout(poll, 2200);
    },

    // ── Helpers ────────────────────────────────────────────────────────────
    scrollDown() { const el=document.getElementById('msg-scroll'); if(el) el.scrollTop=el.scrollHeight; },
    fmtTokens(n) { if(n==null)return'—'; if(n>=1_000_000)return(n/1_000_000).toFixed(1)+'M'; if(n>=1_000)return Math.round(n/1_000)+'K'; return String(n); },
    relTime(str) {
      if(!str)return''; const d=new Date(str.endsWith('Z')?str:str+'Z'); const s=(Date.now()-d)/1000;
      if(s<60)return'только что'; if(s<3600)return Math.floor(s/60)+' мин'; if(s<86400)return Math.floor(s/3600)+' ч';
      return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    },
    modelShort(key) { if(!key)return''; const m=this.modelCatalog[key]; return m?m.name.replace('Gemini ',''):key.replace('gemini-',''); },
    renderMd(text) { if(!text)return''; try{return marked.parse(text)}catch{return text} },
    async copyText(t) { try{ await navigator.clipboard.writeText(t) } catch {} },

    // ── Courses ────────────────────────────────────────────────────────────
    async toggleCourses() {
      this.showCourses = !this.showCourses;
      if (this.showCourses && this.courses.length === 0) {
        await this.loadCourses();
      }
    },

    async loadCourses() {
      this.cpLoading = true;
      try {
        const r = await this.api('/api/courses');
        if (r.ok) this.courses = await r.json();
      } catch(e) { console.error('loadCourses:', e); }
      finally { this.cpLoading = false; }
    },

    async createCourse() {
      if (!this.cpNewTitle.trim()) return;
      try {
        const r = await this.api('/api/courses', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ title: this.cpNewTitle.trim(), description: this.cpNewDesc.trim() }),
        });
        if (r.ok) {
          const course = await r.json();
          this.courses.unshift(course);
          this.cpNewTitle = ''; this.cpNewDesc = ''; this.cpCreating = false;
          this.openCourse(course);
        }
      } catch(e) { console.error('createCourse:', e); }
    },

    async deleteCourse(id) {
      if (!confirm('Удалить курс и все материалы?')) return;
      try {
        await this.api(`/api/courses/${id}`, { method: 'DELETE' });
        this.courses = this.courses.filter(c => c.id !== id);
        if (this.cpActiveCourse?.id === id) {
          this.cpActiveCourse = null; this.cpTab = 'list'; this.cpDocs = [];
        }
      } catch(e) { console.error('deleteCourse:', e); }
    },

    async openCourse(course) {
      this.cpActiveCourse = course;
      this.cpTab = 'docs';
      await this.loadDocs();
    },

    async loadDocs() {
      if (!this.cpActiveCourse) return;
      this.cpDocsLoading = true;
      try {
        const r = await this.api(`/api/courses/${this.cpActiveCourse.id}/documents`);
        if (r.ok) {
          this.cpDocs = await r.json();
          // Start polling if any are still indexing
          this.maybeStartDocPoll();
        }
      } catch(e) { console.error('loadDocs:', e); }
      finally { this.cpDocsLoading = false; }
    },

    maybeStartDocPoll() {
      const needsPoll = this.cpDocs.some(d => d.status === 'indexing' || d.status === 'pending');
      if (needsPoll && !this.cpPollTimer) {
        this.cpPollTimer = setInterval(async () => {
          await this.loadDocs();
          if (!this.cpDocs.some(d => d.status === 'indexing' || d.status === 'pending')) {
            clearInterval(this.cpPollTimer); this.cpPollTimer = null;
            // Refresh courses list to update chunk counts
            await this.loadCourses();
          }
        }, 3000);
      }
    },

    async onCourseFileSelect(e) {
      const files = Array.from(e.target.files);
      e.target.value = '';
      for (const f of files) await this.uploadCourseFile(f);
    },

    async onCourseFileDrop(e) {
      this.cpDragging = false;
      const files = Array.from(e.dataTransfer.files);
      for (const f of files) await this.uploadCourseFile(f);
    },

    async uploadCourseFile(file) {
      if (!this.cpActiveCourse) return;
      const fd = new FormData(); fd.append('file', file);
      // Optimistic UI — show pending immediately
      const tmpId = 'tmp-' + Date.now();
      this.cpDocs.unshift({ id: tmpId, filename: file.name, status: 'pending', source_type: file.name.split('.').pop() || 'file', chunk_count: 0 });
      try {
        const r = await this.api(`/api/courses/${this.cpActiveCourse.id}/ingest`, { method: 'POST', body: fd });
        if (r.ok) {
          const data = await r.json();
          // Replace tmp with real doc
          const idx = this.cpDocs.findIndex(d => d.id === tmpId);
          if (idx !== -1) this.cpDocs[idx] = { ...this.cpDocs[idx], id: data.document_id, status: data.status };
          this.maybeStartDocPoll();
        } else {
          this.cpDocs = this.cpDocs.filter(d => d.id !== tmpId);
        }
      } catch(e) {
        this.cpDocs = this.cpDocs.filter(d => d.id !== tmpId);
        console.error('upload file:', e);
      }
    },

    async ingestYoutube() {
      if (!this.cpActiveCourse || !this.cpYoutubeUrl.trim()) return;
      const url = this.cpYoutubeUrl.trim();
      this.cpYoutubeUrl = '';
      const tmpId = 'yt-' + Date.now();
      this.cpDocs.unshift({ id: tmpId, filename: url, status: 'pending', source_type: 'youtube', chunk_count: 0 });
      try {
        const r = await this.api(`/api/courses/${this.cpActiveCourse.id}/ingest-url`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ url }),
        });
        if (r.ok) {
          const data = await r.json();
          const idx = this.cpDocs.findIndex(d => d.id === tmpId);
          if (idx !== -1) this.cpDocs[idx] = { ...this.cpDocs[idx], id: data.document_id, status: data.status };
          this.maybeStartDocPoll();
        } else {
          this.cpDocs = this.cpDocs.filter(d => d.id !== tmpId);
        }
      } catch(e) {
        this.cpDocs = this.cpDocs.filter(d => d.id !== tmpId);
        console.error('ingest youtube:', e);
      }
    },

    async deleteDoc(docId) {
      if (!this.cpActiveCourse) return;
      try {
        await this.api(`/api/courses/${this.cpActiveCourse.id}/documents/${docId}`, { method: 'DELETE' });
        this.cpDocs = this.cpDocs.filter(d => d.id !== docId);
      } catch(e) { console.error('deleteDoc:', e); }
    },

    async toggleChatCourse(courseId) {
      if (!this.currentChatId) return;
      const currentLinked = this.currentChat?.course_id;
      const newCourseId = currentLinked === courseId ? null : courseId;
      try {
        const r = await this.api(`/api/chats/${this.currentChatId}/course`, {
          method: 'PATCH',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ course_id: newCourseId }),
        });
        if (r.ok) {
          // Update the chat object in memory
          const c = this.chats.find(c => c.id === this.currentChatId);
          if (c) c.course_id = newCourseId;
        }
      } catch(e) { console.error('toggleChatCourse:', e); }
    },

    pay() {
      if(!this.selPlan)return;
      const p=this.plans.find(p=>p.id===this.selPlan);
      alert(`Переход к оплате: ${p.price}\nТокены зачислятся автоматически.`);
      this.showBuyModal=false; this.selPlan=null;
    },
  };
}
